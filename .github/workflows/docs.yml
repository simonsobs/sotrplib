name: Build docs

on:
  push:
    branches: [main, integrate_sphinx]
  pull_request:
    branches: [main]

jobs:
  build-docs:
    runs-on: ubuntu-latest
    env:
      UV_SYSTEM_PYTHON: 1
      FC: gfortran
      CXX: g++
      CC: gcc

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv pip install pixell; uv pip install -e ".[docs]"

      - name: Build docs
        run: sphinx-build -b html docs docs/_build/html -W --keep-going

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy-docs:
    needs: build-docs
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/integrate_sphinx'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
