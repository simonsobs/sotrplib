name: Build docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-docs:
    runs-on: ubuntu-latest
    env:
      UV_SYSTEM_PYTHON: 1
      FC: gfortran
      CXX: g++
      CC: gcc

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv pip install pixell; uv pip install -e ".[docs]"

      - name: Build docs
        run: sphinx-build -b html docs docs/_build/html -W --keep-going
